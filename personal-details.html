<body class="nav-compact">

<!-- NAVBAR -->
<header>
    <div class="navbar">

        <div class="logo">
            <img src="assets/pizza-logo.png" alt="logo">
            <span>PIZZA BY THE SLICE</span>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about-us.html">About Us</a></li>
                <li><a href="personal-details.html">Order Form</a></li>
            </ul>
        </nav>

    </div>
</header>

<section class="pd-container">

<h1>ORDER FORM</h1>
<p class="breadcrumb"><b>Personal Details</b></p>

<form>

<div class="form-box">

<div class="row">
<label>Full Name: <span>*</span></label>

<div class="name-fields">
<input type="text" name="firstname" placeholder="First Name"
required minlength="5" maxlength="60">

<input type="text" name="lastname" placeholder="Last Name"
required minlength="5" maxlength="60">
</div>
</div>


<div class="row">
<label>Email Address: <span>*</span></label>

<input type="email" name="email"
required>
</div>


<div class="row">
<label>Phone Number: <span>*</span></label>

<input type="tel"
name="phone"
pattern="[0-9]{7,11}"
required
placeholder="Numbers only">
</div>


<div class="row">
<label>Age Field: <span>*</span></label>

<input type="number"
name="age"
min="13"
max="99"
required>
</div>


<div class="buttons">

<a href="#" type="button" class="reset">Reset</a>

<a href="index.html" button type="button" class="back">⬅ Back</>

<a href="pizza-selection" button type="submit" class="next">Next ➜</>

</div>

</div>

</form>

</section>

</body>
</html>
