<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fulfillment & Payment</title>

<link rel="stylesheet" href="css/style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alice&family=Archivo+Black&family=Bungee&family=Cinzel:wght@400..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Monsieur+La+Doulaise&family=Pacifico&family=Pinyon+Script&family=Roboto+Slab:wght@100..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">

</head>

<body class="nav-compact">

<!-- NAVBAR -->
<header>
    <div class="navbar">

        <div class="logo">
            <img src="assets/pizza-logo.png" alt="logo">
            <span>PIZZA BY THE SLICE</span>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about-us.html">About Us</a></li>
                <li><a href="personal-details.html">Order Form</a></li>
            </ul>
        </nav>

    </div>
</header>

<section class="pd-container">

<h1>ORDER FORM</h1>
<p class="breadcrumb">Personal Details &gt; Pizza Selection &gt; Toppings &gt; <b>Fulfillment &amp; Payment</b></p>

<form id="fulfillment-form">

<div class="form-box fp-box">
<h2 class="form-title">Fulfillment &amp; Payment</h2>

<div class="fp-row fp-delivery">
    <div class="fp-label">Delivery Method: <span>*</span></div>
    <label class="fp-radio">
        <input type="radio" name="delivery" value="home" checked>
        Home Delivery
    </label>
    <label class="fp-radio">
        <input type="radio" name="delivery" value="pickup">
        Store Pickup
    </label>
</div>

<div class="fp-row">
    <label class="fp-label" for="address">Address: <span>*</span></label>
    <textarea id="address" name="address" class="fp-textarea" rows="3" placeholder="Enter your full address here..." required></textarea>
</div>

<fieldset class="fp-fieldset">
    <legend>Payment Details</legend>

    <div class="fp-row">
        <label class="fp-label" for="payment">Payment Method: <span>*</span></label>
        <select id="payment" name="payment" class="fp-select" required>
            <option value="" selected disabled>-- Choose a method --</option>
            <option>Credit Card</option>
            <option>GCash</option>
            <option>Cash on Delivery</option>
        </select>
    </div>

    <div class="fp-row">
        <label class="fp-label" for="card-number">Card Number (Required for credit card only):</label>
        <input id="card-number" name="card-number" class="fp-input" type="text" placeholder="1234567890123456">
    </div>
</fieldset>

<div class="buttons fp-buttons">
    <button type="reset" class="reset">Reset</button>
    <a href="toppings.html" button type="button" class="back">&larr; Back</a>
    <a href="index.html" button type="submit" class="next">Next &rarr;</a>
</div>

</div>

</form>

</section>

<script>
const fulfillmentForm = document.getElementById("fulfillment-form");
fulfillmentForm.addEventListener("reset", () => {
    setTimeout(() => {
        document.getElementById("address").value = "";
        const deliveryOptions = fulfillmentForm.querySelectorAll('input[name="delivery"]');
        deliveryOptions.forEach((option) => {
            option.checked = false;
        });
    }, 0);
});
</script>

</body>
</html>
