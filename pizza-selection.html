<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Selection</title>

<link rel="stylesheet" href="css/style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alice&family=Archivo+Black&family=Bungee&family=Cinzel:wght@400..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Monsieur+La+Doulaise&family=Pacifico&family=Pinyon+Script&family=Roboto+Slab:wght@100..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">

</head>

<body class="nav-compact">

<!-- NAVBAR -->
<header>
    <div class="navbar">

        <div class="logo">
            <img src="assets/pizza-logo.png" alt="logo">
            <span>PIZZA BY THE SLICE</span>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about-us.html">About Us</a></li>
                <li><a href="personal-details.html">Order Form</a></li>
            </ul>
        </nav>

    </div>
</header>

<section class="pd-container">

<h1>ORDER FORM</h1>
<p class="breadcrumb">Personal Details &gt; <b>Pizza Selection</b></p>

<form>

<div class="form-box ps-box">
<h2 class="form-title">Pizza Selection</h2>

<div class="ps-section">
    <div class="ps-label">Pizza Size: <span>*</span></div>
    <div class="ps-sizes">
        <label class="ps-size">
            <img src="assets/placeholder.png" alt="Small pizza">
            <div class="ps-size-text">
                <span class="ps-size-name">SMALL</span>
                <span class="ps-size-meta">10 inch</span>
            </div>
            <input type="radio" name="size" value="small" required>
        </label>

        <label class="ps-size">
            <img src="assets/placeholder.png" alt="Medium pizza">
            <div class="ps-size-text">
                <span class="ps-size-name">MEDIUM</span>
                <span class="ps-size-meta">12 inch</span>
            </div>
            <input type="radio" name="size" value="medium" checked>
        </label>

        <label class="ps-size">
            <img src="assets/placeholder.png" alt="Large pizza">
            <div class="ps-size-text">
                <span class="ps-size-name">LARGE</span>
                <span class="ps-size-meta">14 inch</span>
            </div>
            <input type="radio" name="size" value="large">
        </label>

        <label class="ps-size">
            <img src="assets/placeholder.png" alt="Extra large pizza">
            <div class="ps-size-text">
                <span class="ps-size-name">EXTRA LARGE</span>
                <span class="ps-size-meta">16 inch</span>
            </div>
            <input type="radio" name="size" value="extra-large">
        </label>
    </div>
</div>

<div class="ps-section ps-selects">
    <div class="ps-select-group">
        <label class="ps-label" for="crust">Crust Type: <span>*</span></label>
        <select id="crust" name="crust" class="ps-select" required>
            <option value="" selected disabled>-- Choose a crust --</option>
            <option>Thin</option>
            <option>Thick</option>
            <option>Stuffed</option>
            <option>Gluten-Free</option>
        </select>
    </div>

    <div class="ps-select-group">
        <label class="ps-label" for="sauce">Sauce: <span>*</span></label>
        <select id="sauce" name="sauce" class="ps-select" required>
            <option value="" selected disabled>-- Choose a sauce --</option>
            <optgroup label="Classic">
                <option>Tomato</option>
                <option>Garlic White</option>
            </optgroup>
            <optgroup label="Special">
                <option>Pesto</option>
                <option>Barbecue</option>
            </optgroup>
        </select>
    </div>
</div>

<div class="buttons ps-buttons">
    <button type="reset" class="reset">Reset</button>
    <a href="personal-details.html" button type="button" class="back">&larr; Back</a>
    <a href="toppings.html" button type="submit" class="next">Next &rarr;</a>
</div>

</div>

</form>

</section>

</body>
</html>
